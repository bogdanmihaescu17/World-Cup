{% extends "base.html" %}
{% block content %}
<h3 class="mb-3">Overall Ranking</h3>
<div class="table-responsive">
  <table class="table table-striped table-bordered bg-white">
    <thead>
      <tr>
        <th>Rank</th>
        <th>User</th>
        <th>Role</th>
        <th>Points</th>
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr>
        <td>{{ row.rank }}</td>
        <td>{{ row.username }}</td>
        <td>{{ row.role }}</td>
        <td><strong>{{ row.score }}</strong></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
