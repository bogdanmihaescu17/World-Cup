{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card">
      <div class="card-body">
        <h3 class="mb-3">Register</h3>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input class="form-control" name="username" minlength="3" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" type="password" name="password" minlength="6" required />
          </div>
          <button class="btn btn-success w-100" type="submit">Create Account</button>
        </form>
        <p class="mt-3 mb-0">Already have account? <a href="{{ url_for('login') }}">Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
